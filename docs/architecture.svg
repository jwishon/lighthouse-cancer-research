<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 600" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#6b7a89"/>
    </marker>
    <marker id="arrowTeal" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#1c7d8a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1040" height="600" rx="16" fill="#f5f8fa"/>

  <!-- Brand mark: simple lighthouse beacon -->
  <g transform="translate(966,30)">
    <line x1="22" y1="14" x2="46" y2="6"  stroke="#e8a33d" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="22" y1="14" x2="46" y2="14" stroke="#e8a33d" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="22" y1="14" x2="46" y2="22" stroke="#e8a33d" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M10,52 L14,16 L22,16 L26,52 z" fill="#0f2742"/>
    <rect x="13" y="11" width="10" height="7" rx="2" fill="#e8a33d"/>
    <rect x="8" y="52" width="20" height="5" rx="2" fill="#0f2742"/>
  </g>

  <!-- Title -->
  <text x="40" y="50" font-size="27" font-weight="700" fill="#0f2742">How Lighthouse works</text>
  <text x="40" y="78" font-size="14" fill="#5b6b7a">Everything runs on a machine you control. Patient data never leaves it.</text>

  <!-- Public sources band (external) -->
  <rect x="300" y="108" width="700" height="96" rx="12" fill="#eaf1f4" stroke="#cdd8e0"/>
  <text x="316" y="132" font-size="13" font-weight="600" fill="#1c7d8a">Public medical databases · queried daily (search terms only)</text>
  <g font-size="12" fill="#0f2742" text-anchor="middle">
    <rect x="316" y="146" width="120" height="36" rx="8" fill="#ffffff" stroke="#cdd8e0"/>
    <text x="376" y="169">PubMed</text>
    <rect x="448" y="146" width="168" height="36" rx="8" fill="#ffffff" stroke="#cdd8e0"/>
    <text x="532" y="169">ClinicalTrials.gov</text>
    <rect x="628" y="146" width="184" height="36" rx="8" fill="#ffffff" stroke="#cdd8e0"/>
    <text x="720" y="169">Europe PMC preprints</text>
    <rect x="824" y="146" width="148" height="36" rx="8" fill="#ffffff" stroke="#cdd8e0"/>
    <text x="898" y="169">Exa · optional</text>
  </g>

  <!-- Your-machine boundary -->
  <rect x="40" y="244" width="960" height="320" rx="14" fill="none" stroke="#1c7d8a" stroke-width="1.5" stroke-dasharray="7 6"/>
  <rect x="58" y="232" width="290" height="24" rx="6" fill="#1c7d8a"/>
  <text x="68" y="249" font-size="12.5" font-weight="600" fill="#ffffff">Your machine — patient data stays local</text>

  <!-- Sources -> worker (crosses boundary) -->
  <line x1="404" y1="204" x2="360" y2="318" stroke="#1c7d8a" stroke-width="1.6" marker-end="url(#arrowTeal)"/>
  <text x="414" y="262" font-size="11.5" fill="#1c7d8a">queries</text>

  <!-- Stage 1: inputs -->
  <text x="60" y="300" font-size="12" font-weight="600" fill="#5b6b7a">YOU FILL IN</text>
  <rect x="58" y="312" width="180" height="66" rx="10" fill="#ffffff" stroke="#cdd8e0"/>
  <text x="70" y="338" font-size="13.5" font-weight="700" fill="#0f2742">patient-profile.md</text>
  <text x="70" y="357" font-size="11" fill="#5b6b7a">cancer type, stage,</text>
  <text x="70" y="370" font-size="11" fill="#5b6b7a">biomarkers, geography</text>
  <rect x="58" y="390" width="180" height="58" rx="10" fill="#ffffff" stroke="#cdd8e0"/>
  <text x="70" y="414" font-size="13.5" font-weight="700" fill="#0f2742">idea-station.md</text>
  <text x="70" y="433" font-size="11" fill="#5b6b7a">questions to chase</text>

  <!-- inputs -> worker -->
  <line x1="238" y1="345" x2="286" y2="360" stroke="#6b7a89" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="238" y1="419" x2="286" y2="392" stroke="#6b7a89" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Stage 2: worker -->
  <rect x="288" y="330" width="160" height="92" rx="12" fill="#0f2742"/>
  <text x="368" y="372" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Research worker</text>
  <text x="368" y="393" font-size="12" fill="#aebfce" text-anchor="middle">runs daily</text>
  <rect x="288" y="436" width="160" height="46" rx="9" fill="#ffffff" stroke="#1c7d8a"/>
  <text x="368" y="456" font-size="11.5" font-weight="600" fill="#0f2742" text-anchor="middle">seen_sources.json</text>
  <text x="368" y="471" font-size="10.5" fill="#5b6b7a" text-anchor="middle">dedup memory — no repeats</text>

  <!-- worker -> AI -->
  <line x1="448" y1="376" x2="482" y2="376" stroke="#6b7a89" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Stage 3: AI -->
  <rect x="484" y="324" width="192" height="104" rx="12" fill="#1c7d8a"/>
  <text x="580" y="360" font-size="14.5" font-weight="700" fill="#ffffff" text-anchor="middle">AI summarize + rank</text>
  <text x="580" y="381" font-size="10.5" fill="#e4f1f3" text-anchor="middle">evidence level + study quality</text>
  <text x="580" y="399" font-size="10.5" fill="#e4f1f3" text-anchor="middle">filters noise · cites sources</text>
  <text x="580" y="417" font-size="11" font-weight="700" fill="#ffe6c2" text-anchor="middle">never medical advice</text>

  <!-- AI -> digest -->
  <line x1="676" y1="376" x2="704" y2="376" stroke="#6b7a89" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Stage 4: digest -->
  <rect x="706" y="344" width="132" height="66" rx="10" fill="#ffffff" stroke="#0f2742" stroke-width="1.5"/>
  <text x="772" y="375" font-size="14" font-weight="700" fill="#0f2742" text-anchor="middle">Daily digest</text>
  <text x="772" y="393" font-size="11" fill="#5b6b7a" text-anchor="middle">ranked, in plain English</text>

  <!-- digest -> delivery -->
  <line x1="838" y1="360" x2="864" y2="338" stroke="#6b7a89" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="838" y1="392" x2="864" y2="414" stroke="#6b7a89" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Stage 5: delivery -->
  <rect x="866" y="312" width="120" height="50" rx="9" fill="#ffffff" stroke="#cdd8e0"/>
  <text x="926" y="335" font-size="12.5" font-weight="700" fill="#0f2742" text-anchor="middle">Email to you</text>
  <text x="926" y="351" font-size="10.5" fill="#5b6b7a" text-anchor="middle">SMTP, optional</text>
  <rect x="866" y="392" width="120" height="50" rx="9" fill="#ffffff" stroke="#cdd8e0"/>
  <text x="926" y="415" font-size="12.5" font-weight="700" fill="#0f2742" text-anchor="middle">Saved to disk</text>
  <text x="926" y="431" font-size="10.5" fill="#5b6b7a" text-anchor="middle">data/digests/</text>

  <!-- Footer note -->
  <text x="40" y="592" font-size="11.5" fill="#8a98a6">A research aid, not medical advice — every digest is for discussion with a qualified care team. See DISCLAIMER.md.</text>
</svg>
